<!doctype html>

<html lang="en">

<head>

  <meta name="viewport" content="width=device-width,initial-scale=1">

  <meta name="theme-color" content="#0f6cbd">

  <title>QR Quiz</title>

  <style>

    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

           max-width: 760px; margin: 24px auto; padding: 0 16px; }

    .card { border: 1px solid #e5e5e5; border-radius: 14px; padding: 18px; box-shadow: 0 1px 6px rgba(0,0,0,.04); }

    h1 { font-size: 22px; margin: 0 0 12px; }

    #question { font-size: 20px; font-weight: 650; line-height: 1.3; }

    #meta { margin-top: 10px; color: #666; font-size: 14px; }

    #answerBox { margin-top: 14px; padding: 12px; border-radius: 12px;

                 background: #f3f8ff; border: 1px solid #d9ebff; display: none; }

    #answerLabel { font-weight: 650; margin-bottom: 6px; }

    .btnRow { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px; }

    button { padding: 10px 14px; border-radius: 12px; border: 1px solid #d0d0d0;

             background: #fafafa; font-size: 16px; }

    button.primary { background: #0f6cbd; color: white; border-color: #0f6cbd; }

    button:active { transform: translateY(1px); }

    .small { font-size: 13px; color: #666; margin-top: 14px; }

  </style>

</head>

<body>

  <div class="card">

    <h1>Quiz</h1>

 

    <div id="question">Loading…</div>

    <div id="meta"></div>

 

    <div id="answerBox">

      <div id="answerLabel">Answer</div>

      <div id="answer"></div>

    </div>

 

    <div class="btnRow">

      <button id="reveal" class="primary">Reveal answer</button>

      <button id="next">Next question</button>

      <button id="reshuffle">Reshuffle bank</button>

    </div>

 

    <div class="small">

      Tip: “Next question” won’t repeat until the bank is exhausted (then reshuffle).

    </div>

  </div>

 

<script>

  let bank = [];

  let pool = [];

  let current = null;

 

  async function loadBank() {

    const res = await fetch('questions.json', { cache: "no-store" });

    if (!res.ok) throw new Error("Could not load questions.json");

    bank = await res.json();

    if (!Array.isArray(bank) || bank.length === 0) throw new Error("Question bank is empty or invalid");

    reshuffle();

  }

 

  function shuffle(arr) {

    for (let i = arr.length - 1; i > 0; i--) {

      const j = Math.floor(Math.random() * (i + 1));

      [arr[i], arr[j]] = [arr[j], arr[i]];

    }

  }

 

  function reshuffle() {

    pool = bank.slice();

    shuffle(pool);

    showNext();

  }

 

  function showNext() {

    document.getElementById('answerBox').style.display = 'none';

 

    if (pool.length === 0) {

      document.getElementById('question').textContent = "No more questions. Tap “Reshuffle bank”.";

      document.getElementById('meta').textContent = `Total questions in bank: ${bank.length}`;

      current = null;

      return;

    }

 

    current = pool.pop();

    document.getElementById('question').textContent = current.question ?? "(Missing question text)";

    document.getElementById('answer').textContent = current.answer ?? "(Missing answer text)";

    document.getElementById('meta').textContent =

      `Remaining in this run: ${pool.length} • Total in bank: ${bank.length}`;

  }

 

  document.getElementById('reveal').addEventListener('click', () => {

    if (!current) return;

    document.getElementById('answerBox').style.display = 'block';

  });

 

  document.getElementById('next').addEventListener('click', showNext);

  document.getElementById('reshuffle').addEventListener('click', reshuffle);

 

  (async () => {

    try {

      await loadBank();

    } catch (e) {

      document.getElementById('question').textContent = "Couldn’t load the quiz bank.";

      document.getElementById('meta').textContent = e.message;

      console.error(e);

    }

  })();

</script>

</body>

</html>
